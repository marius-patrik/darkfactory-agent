name: Sync Managed Repositories

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync installed repositories
        env:
          GITHUB_APP_ID: ${{ secrets.VIBE_BOT_APP_ID }}
          GITHUB_PRIVATE_KEY: ${{ secrets.VIBE_BOT_PRIVATE_KEY }}
        run: npm run sync:managed
