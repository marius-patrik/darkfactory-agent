name: Sync Managed Repositories

on:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * *"
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create DarkFactory App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check out data-agentos repo
        uses: actions/checkout@v4
        with:
          repository: marius-patrik/data-agentos
          token: ${{ steps.app-token.outputs.token }}
          path: data-agentos

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync installed repositories
        env:
          GITHUB_APP_ID: ${{ secrets.DARK_FACTORY_APP_ID }}
          GITHUB_PRIVATE_KEY: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          DARK_FACTORY_WORKSPACE_ROOT: ${{ github.workspace }}/data-agentos/managed-repository
        run: npm run sync:managed
