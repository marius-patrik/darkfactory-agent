name: DarkFactory Work

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Target repository in owner/name form.
        required: true
        type: string
      issue_number:
        description: Target issue number.
        required: true
        type: string
  issues:
    types:
      - labeled
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  df-work:
    name: Run DarkFactory worker
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issues' && github.event.label.name == 'df:ready') ||
        (github.event_name == 'issue_comment' &&
          !github.event.issue.pull_request &&
          startsWith(github.event.comment.body, '/df run'))
      }}

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          # Privileged workers mint an installation token and receive Codex auth,
          # so they only run in the allowed owner.
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "marius-patrik" ]]; then
            echo "::error::DarkFactory worker can only run in the marius-patrik owner."
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && ("${GITHUB_REF_TYPE:-}" != "branch" || "${GITHUB_REF_NAME}" != "main") ]]; then
            echo "::error::DarkFactory worker workflow_dispatch can only run from the main branch."
            exit 1
          fi

      - name: Resolve canonical control ref
        id: control-ref
        shell: bash
        run: |
          # Pin to an immutable SHA on marius-patrik/darkfactory-agent main so
          # managed repositories cannot execute repo-local worker scripts.
          sha="$(curl -fsSL https://api.github.com/repos/marius-patrik/darkfactory-agent/commits/main | jq -r '.sha')"
          if [[ -z "${sha}" || "${sha}" == "null" ]]; then
            echo "::error::Could not resolve canonical DarkFactory control ref."
            exit 1
          fi
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout DarkFactory control scripts
        uses: actions/checkout@v4
        with:
          repository: marius-patrik/darkfactory-agent
          ref: ${{ steps.control-ref.outputs.sha }}
          path: darkfactory-control
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik

      - name: Run worker
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          DF_CONTROL_REPO: marius-patrik/darkfactory-agent
          DF_TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.repo || github.repository }}
          DF_TARGET_ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        run: node darkfactory-control/.github/scripts/df-work.mjs
