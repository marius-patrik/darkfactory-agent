name: DarkFactory Work

on:
  workflow_dispatch:
    inputs:
      repo:
        description: Target repository in owner/name form.
        required: true
        type: string
      issue_number:
        description: Target issue number.
        required: true
        type: string
  issues:
    types:
      - labeled
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  df-work:
    name: Run DarkFactory worker
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.repository_owner == 'marius-patrik' &&
        ((github.event_name == 'workflow_dispatch' &&
           (github.repository == 'marius-patrik/darkfactory-agent' || inputs.repo == github.repository)) ||
         (github.event_name == 'issues' &&
           github.event.label.name == 'df:ready' &&
           contains(github.event.issue.body || '', 'df-prd:') &&
           contains(fromJSON('["github-actions[bot]", "mp-agents[bot]"]'), github.event.sender.login)) ||
         (github.event_name == 'issue_comment' &&
           !github.event.issue.pull_request &&
           contains(github.event.issue.body || '', 'df-prd:') &&
           startsWith(github.event.comment.body, '/df run') &&
           contains(fromJSON('["OWNER", "COLLABORATOR"]'), github.event.comment.author_association)))
      }}
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          # Privileged workers receive Codex auth, so they only run in the allowed
          # owner. workflow_dispatch runs from the control repository and may target
          # another repo; issue/comment triggers run inside the target repository.
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "marius-patrik" ]]; then
            echo "::error::DarkFactory worker can only run in the marius-patrik owner."
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" && "${GITHUB_REF:-}" != "refs/heads/main" ]]; then
            echo "::error::DarkFactory worker workflow_dispatch can only run from refs/heads/main."
            exit 1
          fi

      - name: Resolve canonical control ref
        id: control-ref
        shell: node {0}
        run: |
          // Pin to an immutable SHA on marius-patrik/darkfactory-agent main so
          // managed repositories cannot execute repo-local worker scripts.
          (async () => {
            const res = await fetch('https://api.github.com/repos/marius-patrik/darkfactory-agent/commits/main');
            if (!res.ok) throw new Error(`Failed to resolve canonical control ref: ${res.status}`);
            const sha = (await res.json()).sha;
            if (typeof sha !== 'string' || !/^[0-9a-f]{40}$/i.test(sha)) {
              throw new Error('Could not resolve canonical DarkFactory control ref.');
            }
            const fs = await import('node:fs');
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `sha=${sha}\n`);
          })();

      - name: Download canonical DarkFactory worker scripts
        shell: node {0}
        run: |
          // Managed repository tokens cannot check out the control repository, so
          // worker scripts are fetched through the public raw API at the pinned SHA.
          (async () => {
            const sha = '${{ steps.control-ref.outputs.sha }}';
            const controlRoot = `https://raw.githubusercontent.com/marius-patrik/darkfactory-agent/${sha}`;
            const files = [
              '.github/scripts/df-lib.mjs',
              '.github/scripts/df-work.mjs',
              '.github/codex-review.Dockerfile',
              '.github/scripts/run-codex-review.sh',
              '.github/codex-review.schema.json'
            ];
            const fs = await import('node:fs');
            for (const file of files) {
              const res = await fetch(`${controlRoot}/${file}`);
              if (!res.ok) throw new Error(`Could not fetch canonical ${file}: ${res.status}`);
              const dest = `darkfactory-control/${file}`;
              await fs.promises.mkdir(dest.slice(0, dest.lastIndexOf('/')), { recursive: true });
              await fs.promises.writeFile(dest, await res.text());
            }
          })();

      - name: Mint mp-agents installation token
        id: app-token
        if: github.event_name == 'workflow_dispatch' && github.repository == 'marius-patrik/darkfactory-agent'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik

      - name: Run worker
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          DF_CONTROL_REPO: marius-patrik/darkfactory-agent
          DF_TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.repo || github.repository }}
          DF_TARGET_ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.issue_number || github.event.issue.number }}
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        run: node darkfactory-control/.github/scripts/df-work.mjs
