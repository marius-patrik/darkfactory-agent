name: DarkFactory Follow Through

on:
  schedule:
    - cron: "41 */2 * * *"
  workflow_dispatch:
    inputs:
      repos:
        description: Optional comma-separated repositories to sweep.
        required: false
        type: string
      exclude_repos:
        description: Optional comma-separated repositories to skip.
        required: false
        type: string
        default: marius-patrik/agents-harness
  pull_request_target:
    types:
      - closed
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read

jobs:
  follow-through:
    name: Green PR sweep and dev issue closure
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev') ||
        (github.event_name == 'pull_request_target' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.base.ref == 'dev')
      }}

    steps:
      - name: Checkout DarkFactory
        uses: actions/checkout@v4
        with:
          repository: marius-patrik/darkfactory-agent
          ref: dev

      - name: Mint mp-agents installation token
        if: ${{ github.event_name != 'pull_request_target' }}
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik

      - name: Run follow-through
        env:
          DARK_FACTORY_TOKEN: ${{ github.event_name == 'pull_request_target' && github.token || steps.app-token.outputs.token }}
          DF_CONTROL_REPO: ${{ github.repository }}
          DF_FOLLOW_THROUGH_MODE: ${{ github.event_name == 'pull_request_target' && 'dev-merge' || 'sweep' }}
          DF_SWEEP_REPOS: ${{ github.event_name == 'workflow_dispatch' && inputs.repos || '' }}
          DF_SWEEP_EXCLUDE_REPOS: ${{ github.event_name == 'workflow_dispatch' && inputs.exclude_repos || 'marius-patrik/agents-harness' }}
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        shell: bash
        run: |
          export GITHUB_EVENT_PAYLOAD="$(cat "$GITHUB_EVENT_PATH")"
          node .github/scripts/df-sweep.mjs
