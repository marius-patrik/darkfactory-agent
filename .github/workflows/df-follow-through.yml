name: DarkFactory Follow Through

on:
  schedule:
    - cron: "41 */2 * * *"
  workflow_dispatch:
    inputs:
      repos:
        description: Optional comma-separated repositories to sweep.
        required: false
        type: string
      exclude_repos:
        description: Optional comma-separated repositories to skip.
        required: false
        type: string
        default: marius-patrik/agents-harness
  pull_request_target:
    types:
      - closed
permissions:
  contents: read

jobs:
  follow-through:
    name: Green PR sweep and dev issue closure
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.event_name == 'schedule' ||
        (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/dev') ||
        (github.event_name == 'pull_request_target' &&
          github.event.pull_request.merged == true &&
          github.event.pull_request.base.ref == 'dev')
      }}

    steps:
      - name: Checkout DarkFactory
        if: ${{ github.event_name != 'pull_request_target' }}
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik

      - name: Run follow-through
        if: ${{ github.event_name != 'pull_request_target' }}
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          DF_CONTROL_REPO: ${{ github.repository }}
          DF_FOLLOW_THROUGH_MODE: sweep
          DF_SWEEP_REPOS: ${{ github.event_name == 'workflow_dispatch' && inputs.repos || '' }}
          DF_SWEEP_EXCLUDE_REPOS: ${{ github.event_name == 'workflow_dispatch' && inputs.exclude_repos || 'marius-patrik/agents-harness' }}
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        run: node .github/scripts/df-sweep.mjs

      - name: Close issues for dev merge
        if: ${{ github.event_name == 'pull_request_target' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pull = context.payload.pull_request;
            const provenance = `${pull.title || ""}\n${pull.body || ""}`;
            const isDarkFactoryPr = pull.head.ref.startsWith("df/") && (
              /DarkFactory Worker Summary/.test(provenance) ||
              /<!--\s*dark-factory:/i.test(provenance) ||
              /\bDarkFactory\b/i.test(provenance) ||
              /\bDark Factory\b/i.test(provenance)
            );
            if (!isDarkFactoryPr) {
              core.info("Skipping dev issue closure because the merged PR lacks DarkFactory provenance.");
              return;
            }

            const issueNumbers = [...new Set(
              Array.from(
                (pull.body || "").matchAll(/\b(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)\b/gi),
                (match) => Number(match[1]),
              ),
            )].filter((number) => Number.isInteger(number) && number > 0);

            for (const issue_number of issueNumbers) {
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                per_page: 100,
              });
              const marker = `merged to dev in ${pull.html_url}`;
              if (!comments.data.some((comment) => comment.body?.includes(marker))) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number,
                  body: `${marker}; releases with the next dev→main PR`,
                });
              }
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                state: "closed",
              });
            }
