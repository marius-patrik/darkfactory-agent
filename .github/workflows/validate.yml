name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: python -m uv sync --locked

      - name: Lint
        run: python -m uv run ruff check agentos_gateway tests

      - name: Typecheck
        run: python -m uv run mypy agentos_gateway

      - name: Test
        run: python -m uv run pytest -q
