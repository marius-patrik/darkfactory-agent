name: DarkFactory One-Time Reconciliation Bootstrap

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: darkfactory-reconciliation-bootstrap
  cancel-in-progress: false

jobs:
  reconcile:
    name: Create trusted reconciliation commit
    if: ${{ github.repository == 'marius-patrik/DarkFactory' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY}" != "marius-patrik/DarkFactory" || "${GITHUB_REF}" != "refs/heads/main" ]]; then
            echo "::error::The reconciliation bootstrap runs only from protected marius-patrik/DarkFactory@main."
            exit 1
          fi

      - name: Mint bounded reconciliation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik
          repositories: DarkFactory
          permission-contents: write

      - name: Create exact App-authored reconciliation commit
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const expectedDev = "c512258f6bb6f429f2c8779087c28f196570a1be";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const main = context.sha;

            const [{ data: mainRef }, { data: devRef }, { data: devCommit }] = await Promise.all([
              github.rest.git.getRef({ owner, repo, ref: "heads/main" }),
              github.rest.git.getRef({ owner, repo, ref: "heads/dev" }),
              github.rest.repos.getCommit({ owner, repo, ref: expectedDev })
            ]);
            if (mainRef.object.sha !== main) {
              core.setFailed(`Protected main moved: expected ${main}, observed ${mainRef.object.sha}`);
              return;
            }
            if (devRef.object.sha !== expectedDev) {
              core.setFailed(`Protected dev moved: expected ${expectedDev}, observed ${devRef.object.sha}`);
              return;
            }

            const branch = `reconcile/${main.slice(0, 8)}-${expectedDev.slice(0, 8)}`;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              core.setFailed(`Ref ${branch} already exists; refusing to overwrite it`);
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const { data: commit } = await github.rest.git.createCommit({
              owner,
              repo,
              message: `Reconcile main ${main.slice(0, 12)} into dev ${expectedDev.slice(0, 12)}`,
              tree: devCommit.commit.tree.sha,
              parents: [expectedDev, main]
            });
            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/heads/${branch}`,
              sha: commit.sha
            });
            core.notice(`Created ${branch} at ${commit.sha} with exact validated dev tree ${devCommit.commit.tree.sha}`);
