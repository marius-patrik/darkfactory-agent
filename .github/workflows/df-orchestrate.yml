name: DarkFactory Orchestrate

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
  issues:
    types:
      - labeled
  issue_comment:
    types:
      - created
  workflow_run:
    workflows:
      - DarkFactory Plan
      - DarkFactory Work
      - DarkFactory Follow Through
    types:
      - completed

permissions:
  contents: read

jobs:
  orchestrate:
    name: Dispatch ready work
    runs-on: ubuntu-latest
    if: >-
      ${{
        (
          github.repository == 'marius-patrik/agent-darkfactory' &&
          (
            github.event_name == 'schedule' ||
            github.event_name == 'workflow_dispatch' ||
            (
              github.event_name == 'workflow_run' &&
              github.event.workflow_run.head_branch == 'main' &&
              github.event.workflow_run.conclusion == 'success'
            )
          )
        ) ||
        (
          github.repository_owner == 'marius-patrik' &&
          (
            (
              github.event_name == 'issues' &&
              github.event.action == 'labeled' &&
              github.event.label.name == 'df:ready'
            ) ||
            (
              github.event_name == 'issue_comment' &&
              github.event.action == 'created' &&
              !github.event.issue.pull_request &&
              contains(github.event.comment.body, '/df run') &&
              (
                github.event.comment.author_association == 'OWNER' ||
                github.event.comment.author_association == 'MEMBER' ||
                github.event.comment.author_association == 'COLLABORATOR'
              )
            )
          )
        )
      }}
    permissions:
      actions: write
      contents: read

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "marius-patrik" ]]; then
            echo "::error::DarkFactory orchestrator can only run in the marius-patrik owner."
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" != "refs/heads/main" ]]; then
            echo "::error::DarkFactory orchestrator can only run from refs/heads/main."
            exit 1
          fi

      - name: Resolve DarkFactory script path
        id: script-path
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "path=.github/scripts/df-orchestrate.mjs" >> "$GITHUB_OUTPUT"
          else
            echo "path=.github/scripts/df-orchestrate.mjs" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout DarkFactory from this repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik
          permission-actions: write
          permission-contents: write
          permission-issues: write
          permission-workflows: write

      - name: Run orchestrator
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          DF_CONTROL_REPO: marius-patrik/agent-darkfactory
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
        shell: bash
        run: |
          export GITHUB_EVENT_PAYLOAD="$(cat "$GITHUB_EVENT_PATH")"
          node ${{ steps.script-path.outputs.path }}
