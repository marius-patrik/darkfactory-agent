name: DarkFactory Fix Cycle

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: df-fix
  cancel-in-progress: false

jobs:
  fix:
    name: Fix red worker PRs
    runs-on: ubuntu-latest
    if: >-
      ${{
        github.repository == 'marius-patrik/agent-darkfactory' &&
        (
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        )
      }}
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY}" != "marius-patrik/agent-darkfactory" ]]; then
            echo "::error::DarkFactory fix cycle can only run from marius-patrik/agent-darkfactory."
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" != "refs/heads/main" ]]; then
            echo "::error::DarkFactory fix cycle can only run from refs/heads/main."
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "branch" && "${GITHUB_REF_NAME:-}" != "main" ]]; then
            echo "::error::DarkFactory fix cycle branch mismatch."
            exit 1
          fi

      - name: Checkout installed DarkFactory fix cycle
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: darkfactory-control
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik
          permission-actions: read
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Run fix cycle
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          DF_CONTROL_REPO: marius-patrik/agent-darkfactory
          DF_TRIGGER: ${{ github.event_name }}
          DF_DATA_REPO: marius-patrik/darkfactory-data
          DF_ALLOW_NO_CHECK_REPOS: ${{ vars.DF_ALLOW_NO_CHECK_REPOS }}
          DF_MAX_FIX_ROUNDS: ${{ vars.DF_MAX_FIX_ROUNDS }}
        run: node darkfactory-control/.github/scripts/df-fix.mjs
