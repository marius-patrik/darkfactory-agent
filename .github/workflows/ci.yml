name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  suites:
    name: Suite / ${{ matrix.label }} (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: inventory
            runner: ubuntu-latest
            label: fail-closed inventory
          - suite: core
            runner: ubuntu-latest
            label: core
          - suite: core
            runner: windows-latest
            label: core platform
          - suite: gateway
            runner: ubuntu-latest
            label: gateway
          - suite: gateway-real
            runner: ubuntu-latest
            label: real gateway process
          - suite: engine-real
            runner: ubuntu-latest
            label: inferctl engine routing
          - suite: harness
            runner: ubuntu-latest
            label: harness
          - suite: inference
            runner: ubuntu-latest
            label: inference
          - suite: manager
            runner: ubuntu-latest
            label: manager
          - suite: manager
            runner: windows-latest
            label: manager platform
          - suite: darkfactory
            runner: ubuntu-latest
            label: DarkFactory plugin
          - suite: memory
            runner: ubuntu-latest
            label: Memory plugin
          - suite: memory
            runner: windows-latest
            label: Memory plugin platform
          - suite: release
            runner: ubuntu-latest
            label: installer and release smoke
          - suite: sync
            runner: ubuntu-latest
            label: encrypted sync smoke
          - suite: review
            runner: ubuntu-latest
            label: review regressions
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Go
        if: matrix.suite == 'core'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: packages/core/contracts-go/go.sum

      - name: Set up uv
        if: contains(fromJSON('["gateway", "gateway-real", "engine-real", "inference"]'), matrix.suite)
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.suite }} suite
        run: node scripts/run-ci-suite.mjs ${{ matrix.suite }}

  validate:
    name: Validate
    if: ${{ always() }}
    needs: suites
    runs-on: ubuntu-latest
    steps:
      - name: Require every suite and platform leg
        env:
          SUITES_RESULT: ${{ needs.suites.result }}
        run: |
          if [ "$SUITES_RESULT" != "success" ]; then
            echo "One or more required CI suite legs did not pass: $SUITES_RESULT" >&2
            exit 1
          fi
