name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate managed product shape
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f .darkfactory/managed-repository.json
          if test -f agent.package.json; then
            node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync("agent.package.json","utf8")); if(m.schemaVersion!==1||m.id!=="memory"||m.kind!=="plugin"||!m.entry) process.exit(1)'
            test -f .codex-plugin/plugin.json
            test -f src/index.ts
            test -f src/cli.ts
            test -f test/memory-plugin.test.ts
          fi
