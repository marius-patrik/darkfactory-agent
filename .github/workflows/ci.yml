name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Create repository checkout token
        if: github.event_name == 'push'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARKFACTORY_APP_ID }}
          private-key: ${{ secrets.DARKFACTORY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            Andromeda
            Andromeda-data
            DarkFactory
            life-support
            singularity
            SkyAgent

      - name: Check out repository with private components
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Check out pull request without private components
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: packages/core/contracts-go/go.sum

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate
        run: bun run ci

      - name: Verify canonical repository layout
        run: bun run layout:check
