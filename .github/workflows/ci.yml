name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  suites:
    name: Suite / ${{ matrix.label }} (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: inventory
            runner: ubuntu-latest
            label: fail-closed inventory
          - suite: core
            runner: ubuntu-latest
            label: core
          - suite: core
            runner: windows-latest
            label: core platform
          - suite: gateway
            runner: ubuntu-latest
            label: gateway
          - suite: gateway-real
            runner: ubuntu-latest
            label: real gateway process
          - suite: engine-real
            runner: ubuntu-latest
            label: inferctl engine routing
          - suite: harness
            runner: ubuntu-latest
            label: harness
          - suite: inference
            runner: ubuntu-latest
            label: inference
          - suite: manager
            runner: ubuntu-latest
            label: manager
          - suite: manager
            runner: windows-latest
            label: manager platform
          - suite: memory-plugin
            runner: ubuntu-latest
            label: memory plugin
          - suite: memory-plugin
            runner: windows-latest
            label: memory plugin platform
          - suite: darkfactory
            runner: ubuntu-latest
            label: DarkFactory plugin
          - suite: memory
            runner: ubuntu-latest
            label: Memory plugin
          - suite: memory
            runner: windows-latest
            label: Memory plugin platform
          - suite: release
            runner: ubuntu-latest
            label: installer and release smoke
          - suite: sync
            runner: ubuntu-latest
            label: encrypted sync smoke
          - suite: review
            runner: ubuntu-latest
            label: review regressions
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Go
        if: matrix.suite == 'core'
        uses: actions/setup-go@v6
        with:
          go-version: stable
          cache-dependency-path: packages/core/contracts-go/go.sum

      - name: Set up uv
        if: contains(fromJSON('["gateway", "gateway-real", "engine-real", "inference"]'), matrix.suite)
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.suite }} suite
        run: node scripts/run-ci-suite.mjs ${{ matrix.suite }}

  repository-contract:
    name: Repository contract
    runs-on: ubuntu-latest
    steps:
      - name: Check out exact head without persisted credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify exact diff and initialize every moved public gitlink
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          git diff --check "$BASE_SHA...$HEAD_SHA"
          git submodule update --init --recursive -- packages/darkfactory packages/memory packages/lifequest packages/skyagent packages/singularity packages/fabrica
          status="$(git submodule status --recursive -- packages/darkfactory packages/memory packages/lifequest packages/skyagent packages/singularity packages/fabrica)"
          printf '%s\n' "$status"
          if printf '%s\n' "$status" | grep -Eq '^[-+U]'; then
            echo "One or more recursive submodules are missing, mismatched, or conflicted." >&2
            exit 1
          fi

  validate:
    name: Validate
    if: ${{ always() }}
    needs:
      - suites
      - repository-contract
    runs-on: ubuntu-latest
    steps:
      - name: Require every suite, platform leg, and repository contract
        env:
          SUITES_RESULT: ${{ needs.suites.result }}
          REPOSITORY_CONTRACT_RESULT: ${{ needs.repository-contract.result }}
        run: |
          if [ "$SUITES_RESULT" != "success" ]; then
            echo "One or more required CI suite legs did not pass: $SUITES_RESULT" >&2
            exit 1
          fi
          if [ "$REPOSITORY_CONTRACT_RESULT" != "success" ]; then
            echo "The exact diff or fresh-clone recursive submodule contract did not pass: $REPOSITORY_CONTRACT_RESULT" >&2
            exit 1
          fi
