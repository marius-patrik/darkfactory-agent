name: DarkFactory Audit

on:
  schedule:
    - cron: "41 5 * * *"
  workflow_dispatch:
    inputs:
      repo:
        description: Target repository in owner/name form. Defaults to all active managed repositories.
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  df-audit:
    name: Audit managed repositories
    runs-on: ubuntu-24.04
    if: >-
      ${{
        github.repository == 'marius-patrik/agent-darkfactory' &&
        (
          github.event_name == 'schedule' ||
          github.event_name == 'workflow_dispatch'
        )
      }}

    steps:
      - name: Validate trusted control ref
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY_OWNER}" != "marius-patrik" ]]; then
            echo "::error::DarkFactory audit can only run in the marius-patrik owner."
            exit 1
          fi

          if [[ "${GITHUB_REF:-}" != "refs/heads/main" ]]; then
            echo "::error::DarkFactory audit can only run from refs/heads/main."
            exit 1
          fi

          if [[ "${GITHUB_REF_TYPE:-}" == "branch" && "${GITHUB_REF_NAME:-}" != "main" ]]; then
            echo "::error::DarkFactory audit branch mismatch."
            exit 1
          fi

      - name: Validate manual audit target repository
        if: github.event_name == 'workflow_dispatch' && inputs.repo
        shell: bash
        env:
          DF_MANUAL_AUDIT_REPO: ${{ inputs.repo }}
        run: |
          repo="${DF_MANUAL_AUDIT_REPO}"
          case "${repo}" in
            marius-patrik/fabrica|marius-patrik/skyblock-agent|marius-patrik/singularity|marius-patrik/life-support)
              echo "::error::DarkFactory manual audit target is parked: ${repo}."
              exit 1
              ;;
            marius-patrik/*)
              ;;
            *)
              echo "::error::DarkFactory manual audit target must be a marius-patrik repository."
              exit 1
              ;;
          esac

      - name: Resolve DarkFactory script path
        id: script-path
        shell: bash
        run: echo "path=.github/scripts/df-audit.mjs" >> "$GITHUB_OUTPUT"

      - name: Checkout DarkFactory control scripts
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Mint mp-agents installation token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.DARK_FACTORY_APP_ID }}
          private-key: ${{ secrets.DARK_FACTORY_PRIVATE_KEY }}
          owner: marius-patrik
          permission-actions: read
          permission-contents: write
          permission-issues: write

      - name: Run audit
        env:
          DARK_FACTORY_TOKEN: ${{ steps.app-token.outputs.token }}
          DF_CONTROL_REPO: marius-patrik/agent-darkfactory
          DF_TARGET_REPO: ${{ github.event_name == 'workflow_dispatch' && inputs.repo || github.repository }}
          DF_AUDIT_ALL: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !inputs.repo)) && 'true' || 'false' }}
          DF_TRIGGER: ${{ github.event_name }}
        run: node ${{ steps.script-path.outputs.path }}
