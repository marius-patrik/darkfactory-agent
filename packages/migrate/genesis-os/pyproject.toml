[build-system]
requires = ["setuptools>=75", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "genesis-os"
version = "0.1.0"
description = "A birth/wake/sleep/evolution substrate for persistent, tool-native learning organisms."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [{ name = "Patrik" }]
dependencies = [
  "fastapi>=0.115,<1",
  "httpx>=0.27,<1",
  "jsonschema>=4.23,<5",
  "numpy>=2.0,<3",
  "orjson>=3.10,<4",
  "pydantic>=2.10,<3",
  "PyYAML>=6.0,<7",
  "rich>=13.9,<15",
  "safetensors>=0.5,<1",
  "torch>=2.6,<3",
  "typer>=0.15,<1",
  "uvicorn>=0.34,<1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3,<10",
  "pytest-asyncio>=0.25,<2",
  "ruff>=0.11,<1",
]

[project.scripts]
genesis = "genesis_os.cli:app"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
pythonpath = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "RUF"]
ignore = ["E501"]
