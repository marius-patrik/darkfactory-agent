name: patrik-personal-genesis
seed: 42
genome:
  d_model: 512
  n_layers: 12
  n_heads: 8
  max_sequence_length: 4096
  memory_slots: 32
  world_latent_dim: 256
curriculum:
  seed: 42
  validation_fraction: 0.05
  stages:
  - name: textbook_foundations
    generator: textbook
    examples: 128
    parameters:
      paths:
      - ../examples/textbooks/foundations.yaml
  - name: procedural_reasoning
    generator: procedural_distillation
    examples: 100000
    prerequisites:
    - textbook_foundations
    weight: 1.5
    parameters:
      teacher_required: false
  - name: language
    generator: language_foundations
    examples: 100000
    prerequisites:
    - textbook_foundations
  - name: arithmetic
    generator: arithmetic
    examples: 100000
  - name: logic
    generator: symbolic_logic
    examples: 100000
  - name: algorithms
    generator: algorithms
    examples: 100000
  - name: causality
    generator: causal_worlds
    examples: 100000
  - name: tools
    generator: tool_use
    examples: 150000
    weight: 1.5
  - name: memory
    generator: memory_recall
    examples: 100000
    weight: 1.4
  personal:
    sources:
    - ../personal-data/chatgpt-export/conversations.json
    - ../personal-data/documents
    include_assistant_imitation: false
    redact_secrets: true
training:
  epochs: 3
  batch_size: 16
  learning_rate: 0.0003
  warmup_steps: 2000
  gradient_accumulation_steps: 4
  device: auto
viability:
  max_validation_loss: 4.0
  min_tool_name_accuracy: 0.6
  generation_samples: 128
