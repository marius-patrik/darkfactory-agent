[project]
name = "agent-os-inference"
version = "0.1.0"
description = "Agent OS gateway-backed inference worker and private runtime boundary."
requires-python = ">=3.12"
dependencies = [
    # Runtime for the generated wire-contract stubs (agent/gen).
    # protoc-gen-python v35 emits gencode that validates against the matching
    # protobuf runtime.
    "protobuf==7.35.0",
    "httpx==0.28.1",
]

[project.scripts]
agent-os-inference = "agent.loop.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["agent"]

[dependency-groups]
dev = [
    "mypy==2.2.0",
    "pytest==9.0.3",
    "pytest-asyncio==1.4.0",
    "ruff==0.15.21",
]

[tool.pytest.ini_options]
markers = [
    "live: tests that require a reachable live Agent OS gateway",
]

[tool.ruff]
line-length = 140
target-version = "py312"
exclude = ["agent/gen"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
exclude = ["^agent/gen/"]
