[project]
name = "agents-gateway"
version = "3.0.44"
description = "Agents platform LLM gateway — OpenAI-format, absolute routing, config-driven model registry."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.110",
  "uvicorn[standard]>=0.29",
  "httpx>=0.27",
  "pydantic>=2.0",
  "PyYAML>=6.0",
  "jsonschema>=4.0",
  "typer>=0.9",
  "rich>=13.0",
  "litellm>=1.0",
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
]

[project.scripts]
gateway = "gateway.cli:app"

[tool.setuptools]
packages = ["gateway"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]
