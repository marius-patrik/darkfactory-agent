name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.runtime }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        runtime: [bun]
        include:
          - os: ubuntu-latest
            runtime: node

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies (Bun)
        if: matrix.runtime == 'bun'
        run: bun install

      - name: Install dependencies (Node)
        if: matrix.runtime == 'node'
        run: npm install

      - name: Lint
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} lint

      - name: Typecheck
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} typecheck

      - name: Typecheck engine
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} typecheck:engine

      - name: Unit tests
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} test -- --coverage

      - name: Build
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} build

      - name: Build extension package
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} package

      - name: Integration tests
        if: matrix.os != 'windows-latest'
        run: ${{ matrix.runtime == 'bun' && 'bun run' || 'npm run' }} test:integration

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.runtime == 'bun'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov-report
