name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Typecheck engine
        run: bun run typecheck:engine

      - name: Run unit tests
        run: bun run test -- --coverage

      - name: Build and package extension
        run: bun run package

      - name: Capture VSIX filename
        id: vsix
        run: |
          VSIX=$(ls vsdaw-*.vsix | head -n 1)
          echo "filename=${VSIX}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "${GITHUB_REF_NAME}" \
            --title "VSDAW ${VERSION}" \
            --generate-notes \
            "${{ steps.vsix.outputs.filename }}"

      - name: Publish to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          echo "Publishing to VS Code Marketplace (placeholder - set VSCE_PAT secret)"
          # npx @vscode/vsce publish --pat "$VSCE_PAT" "${{ steps.vsix.outputs.filename }}"

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          echo "Publishing to Open VSX (placeholder - set OVSX_PAT secret)"
          # npx ovsx publish "${{ steps.vsix.outputs.filename }}" --pat "$OVSX_PAT"
