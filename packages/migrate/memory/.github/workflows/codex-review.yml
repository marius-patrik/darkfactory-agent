name: Codex Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  codex-review:
    name: Codex Review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout trusted base
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout immutable review runtime
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: marius-patrik/Andromeda
          ref: 0040bc60d76ee251feb25d4eacfb04eff1e40e43
          fetch-depth: 1
          sparse-checkout: |
            .github/codex-review.Dockerfile
            .github/codex-review.schema.json
            .github/scripts/run-codex-review.sh
          sparse-checkout-cone-mode: false
          persist-credentials: false
          path: trusted-review-runtime

      - name: Build trusted review image
        shell: bash
        run: |
          docker build \
            -f trusted-review-runtime/.github/codex-review.Dockerfile \
            -t darkfactory-codex-review \
            trusted-review-runtime

      - name: Checkout untrusted pull request head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          path: pr-workspace

      - name: Prepare review context
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            fs.mkdirSync("review-context", { recursive: true });
            fs.writeFileSync("review-context/AGENTS.md", fs.existsSync("AGENTS.md") ? fs.readFileSync("AGENTS.md", "utf8") : "No base guidance.");
            fs.writeFileSync("review-context/linked-issues.md", context.payload.pull_request?.body ?? "No pull request body.");

      - name: Run Codex review
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
          BASE_BRANCH: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          CODEX_HOME_DIR="${RUNNER_TEMP}/codex-home"
          REVIEW_OUTPUT_DIR="${RUNNER_TEMP}/review-output"
          mkdir -p "${CODEX_HOME_DIR}" "${REVIEW_OUTPUT_DIR}"
          printf '%s' "${CODEX_AUTH_JSON}" > "${CODEX_HOME_DIR}/auth.json"
          chmod 600 "${CODEX_HOME_DIR}/auth.json"
          set +e
          docker run --rm \
            -e CODEX_HOME=/codex-home \
            -e HOME=/codex-home \
            -e BASE_BRANCH \
            -e BASE_REF=origin/${BASE_BRANCH} \
            -e REVIEW_OUTPUT=/review-output/codex-review.json \
            -e REVIEW_CONTEXT_DIR=/review-context \
            -e PR_TITLE \
            -e PR_BODY \
            -v "${PWD}/pr-workspace:/workspace:ro" \
            -v "${PWD}/review-context:/review-context:ro" \
            -v "${CODEX_HOME_DIR}:/codex-home" \
            -v "${REVIEW_OUTPUT_DIR}:/review-output" \
            darkfactory-codex-review
          REVIEW_EXIT=$?
          set -e
          if [ -s "${REVIEW_OUTPUT_DIR}/codex-review.json" ]; then
            cp "${REVIEW_OUTPUT_DIR}/codex-review.json" codex-review.json
          else
            node -e "const fs=require('fs');fs.writeFileSync('codex-review.json',JSON.stringify({approved:false,summary:'Review produced no result.',blocking_findings:['Inspect Codex Review infrastructure.'],non_blocking_notes:[]},null,2))"
          fi
          exit "${REVIEW_EXIT}"

      - name: Comment review
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const review = JSON.parse(fs.readFileSync("codex-review.json", "utf8"));
            const marker = "<!-- darkfactory-codex-review -->";
            const blocking = review.blocking_findings.length ? review.blocking_findings.map(x => `- ${x}`).join("\n") : "- None";
            const notes = review.non_blocking_notes.length ? review.non_blocking_notes.map(x => `- ${x}`).join("\n") : "- None";
            const verdict = review.approved && review.blocking_findings.length === 0 ? "Approved" : "Changes required";
            const body = `${marker}\n## Agent Autoreview\n\n**Verdict:** ${verdict}\n\n${review.summary}\n\n### Blocking Findings\n\n${blocking}\n\n### Non-Blocking Notes\n\n${notes}`;
            const comments = await github.rest.issues.listComments({ ...context.repo, issue_number: context.issue.number, per_page: 100 });
            const existing = comments.data.find(comment => comment.body?.includes(marker));
            if (existing) await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            else await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });

      - name: Enforce Codex verdict
        if: always()
        shell: bash
        run: node -e "const r=require('./codex-review.json');if(!r.approved||r.blocking_findings.length)process.exit(1)"
