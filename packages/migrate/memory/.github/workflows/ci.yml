name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  shape:
    name: Shape
    runs-on: ubuntu-latest
    steps:
      - name: Check out plugin
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate managed product shape
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f .darkfactory/managed-repository.json
          test -f agent.package.json
          node -e 'const fs=require("fs"); const m=JSON.parse(fs.readFileSync("agent.package.json","utf8")); if(m.schemaVersion!==1||m.id!=="memory"||m.kind!=="plugin"||!m.entry) process.exit(1)'
          test -f .codex-plugin/plugin.json
          test -f src/index.ts
          test -f src/cli.ts
          test -f test/memory-plugin.test.ts

  integration:
    name: Integration / ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out trusted Andromeda dev
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: marius-patrik/Andromeda
          ref: dev
          path: andromeda
          fetch-depth: 1
          persist-credentials: false

      - name: Overlay candidate Memory plugin
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: andromeda/plugins/memory
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install trusted Andromeda dependencies
        working-directory: andromeda
        run: bun install --frozen-lockfile

      - name: Type-check candidate against trusted manager and harness
        working-directory: andromeda
        run: bun ./node_modules/typescript/bin/tsc --noEmit -p plugins/memory/tsconfig.json

      - name: Run Memory integration tests
        working-directory: andromeda
        run: bun test --timeout=30000 --max-concurrency=1 plugins/memory/test/memory-plugin.test.ts

  validate:
    name: Validate
    if: ${{ always() }}
    needs: [shape, integration]
    runs-on: ubuntu-latest
    steps:
      - name: Require shape and both integration platforms
        env:
          SHAPE_RESULT: ${{ needs.shape.result }}
          INTEGRATION_RESULT: ${{ needs.integration.result }}
        shell: bash
        run: |
          set -euo pipefail
          test "$SHAPE_RESULT" = success
          test "$INTEGRATION_RESULT" = success
