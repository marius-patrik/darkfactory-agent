services:
  # 1a. Local reasoner/judge model service.
  # Wave 1 target: llama.cpp OpenAI-compatible server with GGUF weights,
  # CPU threads, and system-RAM backing. Keep default GPU layers at 0 so
  # general/research/judge traffic is not silently GPU-only.
  llama-reasoner:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: agents-llama-reasoner
    profiles: ["bundled-models"]
    ports:
      - "${AGENTS_REASONER_HOST_PORT:-8082}:8080"
    volumes:
      - /home/patrik/models:/models:ro
    command: >
      -m ${AGENTS_REASONER_MODEL:-/models/reasoner.gguf}
      -c ${AGENTS_REASONER_CTX:-131072}
      --host 0.0.0.0
      --port 8080
      -t ${AGENTS_REASONER_THREADS:-64}
      -ngl ${AGENTS_REASONER_NGL:-0}
      --jinja
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      inference:
        aliases:
          - local-reasoner
    restart: unless-stopped

  # 1b. Local coding model service.
  # Coding traffic is routed by the gateway across the s001/s002 GPU coder
  # replicas. Self-hosted NVCF remains an optional disabled burst path until
  # it has live proof.
  vllm-coder:
    image: ${AGENTS_CODER_IMAGE:-vllm/vllm-openai:latest}
    container_name: agents-vllm-coder
    profiles: ["bundled-models"]
    ports:
      - "${AGENTS_CODER_HOST_PORT:-8001}:8000"
    volumes:
      - /home/patrik/models/hf-cache:/root/.cache/huggingface:rw
    devices:
      - nvidia.com/gpu=all
    command: >
      vllm serve ${AGENTS_CODER_MODEL:-Qwen/Qwen2.5-Coder-32B-Instruct-AWQ}
      --served-model-name ${AGENTS_CODER_SERVED_MODEL:-qwen-coder}
      --quantization ${AGENTS_CODER_QUANTIZATION:-awq_marlin}
      --max-model-len ${AGENTS_CODER_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${AGENTS_CODER_GPU_MEMORY_UTILIZATION:-0.95}
      --enable-auto-tool-choice
      --tool-call-parser ${AGENTS_CODER_TOOL_CALL_PARSER:-hermes}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      inference:
        aliases:
          - local-coder
    restart: unless-stopped

  # 2. Event Bus Service (NATS JetStream + KV)
  # In HA mode this is the shared coordination plane. Run this compose on each
  # node with NODE_ID=s001 or NODE_ID=s002 so each NATS server has a unique
  # JetStream server name and advertises its route as s001:6222 or s002:6222.
  # AGENTS_NATS_CLUSTER_ROUTES must include every node route in the plane.
  nats:
    image: nats:2.10-alpine
    container_name: agents-nats
    ports:
      - "${AGENTS_NATS_HOST_PORT:-4222}:4222"
      - "${AGENTS_NATS_CLUSTER_HOST_PORT:-6222}:6222"
      - "${AGENTS_NATS_MONITOR_HOST_PORT:-8222}:8222"
    # -js enables JetStream persistence; -m enables HTTP management; -sd sets
    # the JetStream store. The cluster flags route both node-local NATS servers
    # into one JetStream/KV coordination plane so leader leases are shared.
    command:
      - "-js"
      - "-m"
      - "8222"
      - "-sd"
      - "/data/jetstream"
      - "--name"
      - "${AGENTS_NATS_SERVER_NAME:-${NODE_ID:-}}"
      - "--cluster_name"
      - "${AGENTS_NATS_CLUSTER_NAME:-agents-ha}"
      - "--cluster"
      - "nats://0.0.0.0:6222"
      - "--cluster_advertise"
      - "${AGENTS_NATS_CLUSTER_ADVERTISE:-${NODE_ID:-nats}:6222}"
      - "--routes"
      - "${AGENTS_NATS_CLUSTER_ROUTES:-nats://s001:6222,nats://s002:6222}"
    volumes:
      - nats-data:/data/jetstream:rw
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 3. LLM Gateway Service (Python / LiteLLM router)
  gateway:
    image: ${AGENTS_GATEWAY_IMAGE:-agents-gateway:latest}
    build:
      context: ../gateway
      dockerfile: Dockerfile
    container_name: agents-gateway
    ports:
      - "${AGENTS_GATEWAY_HOST_PORT:-4000}:4000"
    networks:
      default: {}
      inference: {}
    extra_hosts:
      - "host.docker.internal:${AGENTS_DOCKER_HOST_GATEWAY:-host-gateway}"
    environment:
      - GATEWAY_REGISTRY_PATH=/app/registry/models.yaml
      - GATEWAY_ACTIVE_PATH=/app/registry/active.yaml
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - PYTHONUNBUFFERED=1
      - AGENTS_VERSION=${AGENTS_VERSION:-3.0.0}
      - AGENTS_GIT_SHA=${AGENTS_GIT_SHA:-}
      - AGENTS_IMAGE_TAG=${AGENTS_GATEWAY_IMAGE:-agents-gateway:latest}
      - AGENTS_BUILD_TIME=${AGENTS_BUILD_TIME:-}
      - AGENTS_NODE_ID=${NODE_ID:-}
      - GATEWAY_MODEL_LOCAL_REASONER_S001_API_BASE=${AGENTS_REASONER_S001_API_BASE:-http://s001:8082/v1}
      - GATEWAY_MODEL_LOCAL_REASONER_S002_API_BASE=${AGENTS_REASONER_S002_API_BASE:-http://s002:8082/v1}
      - GATEWAY_MODEL_LOCAL_JUDGE_S001_API_BASE=${AGENTS_JUDGE_S001_API_BASE:-http://s001:8082/v1}
      - GATEWAY_MODEL_LOCAL_JUDGE_S002_API_BASE=${AGENTS_JUDGE_S002_API_BASE:-http://s002:8082/v1}
      - GATEWAY_MODEL_QWEN_CODER_S001_API_BASE=${AGENTS_CODER_S001_API_BASE:-http://s001:8001/v1}
      - GATEWAY_MODEL_QWEN_CODER_S002_API_BASE=${AGENTS_CODER_S002_API_BASE:-http://s002:8001/v1}
      - GATEWAY_MODEL_NVCF_BURST_CODER_API_BASE=${AGENTS_NVCF_CODER_API_BASE:-http://nvcf-coder:8001/v1}
    volumes:
      - gateway-traces:/app/traces:rw
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 120s
    restart: unless-stopped

  # 4. Platform Scheduler Daemon (Go engine daemon)
  # HA: Only the leader runs the queue scheduler. Standbys keep HTTP alive.
  # Set NODE_ID per host: NODE_ID=s001 on s001, NODE_ID=s002 on s002.
  # Leaving NODE_ID empty fails closed when NATS_URL is configured.
  daemon:
    image: ${AGENTS_GO_IMAGE:-agents-go-services:latest}
    build:
      context: ../engine/go
      dockerfile: ../../../deploy/Dockerfile.daemon
    container_name: agents-daemon
    ports:
      - "${AGENTS_DAEMON_HOST_PORT:-18080}:8080"
    environment:
      - AGENTS_DAEMON_ADDR=:8080
      - AGENTS_DAEMON_CAP=4
      - AGENTS_DAEMON_DB=/app/data/agents_daemon.db
      - AGENTS_DAEMON_VERSION=${AGENTS_VERSION:-3.0.0}
      - AGENTS_GIT_SHA=${AGENTS_GIT_SHA:-}
      - AGENTS_IMAGE_TAG=${AGENTS_GO_IMAGE:-agents-go-services:latest}
      - AGENTS_HARNESS_IMAGE=${AGENTS_HARNESS_IMAGE:-agents/harness:latest}
      - AGENTS_BUILD_TIME=${AGENTS_BUILD_TIME:-}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NODE_ID=${NODE_ID:-}
      - AGENTS_ROOT=${AGENTS_ROOT:-/home/patrik/agents}
      - AGENTS_REPO=${AGENTS_REPO:-/home/patrik/Projects/agents}
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_TOKEN=${GH_TOKEN:-}
      - GITHUB_OWNER=marius-patrik
      - GITHUB_REPO=agents
      - GITHUB_REF=dev
      - EXECUTOR=kubernetes
      - AGENTS_DAEMON_EXECUTOR=kubernetes
      - AGENTS_K8S_NAMESPACE=${AGENTS_K8S_NAMESPACE:-agents}
      - AGENTS_K8S_CPU_REQUEST=${AGENTS_K8S_CPU_REQUEST:-2}
      - AGENTS_K8S_MEMORY_REQUEST=${AGENTS_K8S_MEMORY_REQUEST:-8Gi}
      - AGENTS_K8S_CPU_LIMIT=${AGENTS_K8S_CPU_LIMIT:-8}
      - AGENTS_K8S_MEMORY_LIMIT=${AGENTS_K8S_MEMORY_LIMIT:-32Gi}
      - AGENTS_K8S_GPU_LIMIT=${AGENTS_K8S_GPU_LIMIT:-1}
      - AGENTS_K8S_TOPOLOGY_SPREAD=${AGENTS_K8S_TOPOLOGY_SPREAD:-1}
      - AGENTS_K8S_AVOID_DISK_PRESSURE=${AGENTS_K8S_AVOID_DISK_PRESSURE:-1}
      - AGENTS_K8S_DISALLOWED_NODES=${AGENTS_K8S_DISALLOWED_NODES:-}
      - KUBECONFIG=${KUBECONFIG:-/app/k3s-client.yaml}
      - GITHUB_APP_PRIVATE_KEY_PATH=/app/.github-app-key.pem
    volumes:
      - ${AGENTS_DAEMON_DATA_DIR:-./data/daemon}:/app/data:rw
      - /home/patrik/.github-app-key.pem:/app/.github-app-key.pem:ro
      - ${AGENTS_KUBECONFIG_HOST_PATH:-/home/patrik/k3s-client.yaml}:/app/k3s-client.yaml:ro
      - ${AGENTS_ROOT:-/home/patrik/agents}:${AGENTS_ROOT:-/home/patrik/agents}:rw
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  # 5. Global Issue-Watching Manager (Go manager)
  # HA: Only the leader runs the polling loop. Standbys keep HTTP alive.
  # Set NODE_ID per host: NODE_ID=s001 on s001, NODE_ID=s002 on s002.
  # Leaving NODE_ID empty fails closed when NATS_URL is configured.
  manager:
    image: ${AGENTS_GO_IMAGE:-agents-go-services:latest}
    build:
      context: ../engine/go
      dockerfile: ../../../deploy/Dockerfile.daemon
    container_name: agents-manager
    entrypoint: ["/app/manager"]
    ports:
      - "${AGENTS_MANAGER_HOST_PORT:-18081}:8081"
    environment:
      - AGENTS_MANAGER_ADDR=:8081
      - AGENTS_MANAGER_REPO_OWNER=marius-patrik
      - AGENTS_MANAGER_REPO_NAME=agents
      - AGENTS_MANAGER_DAEMON_URL=${AGENTS_MANAGER_DAEMON_URL:-http://daemon:8080}
      - AGENTS_MANAGER_GATEWAY_URL=http://gateway:4000
      # Gateway endpoint injected into dispatched run pods (k8s Jobs). Run pods
      # cannot resolve the compose service name http://gateway:4000; they reach
      # the gateway via a cluster-routable node LAN IP. Empty falls back to the
      # compose endpoint (single-host/dev). deploy-release.sh sets this per node.
      - AGENTS_MANAGER_RUN_GATEWAY_URL=${AGENTS_MANAGER_RUN_GATEWAY_URL:-}
      - AGENTS_MANAGER_DB=/app/data/agents_manager.db
      - AGENTS_MANAGER_BASE_BRANCH=dev
      - AGENTS_HARNESS_IMAGE=${AGENTS_HARNESS_IMAGE:-agents/harness:latest}
      - AGENTS_MANAGER_VERSION=${AGENTS_VERSION:-3.0.0}
      - AGENTS_GIT_SHA=${AGENTS_GIT_SHA:-}
      - AGENTS_IMAGE_TAG=${AGENTS_GO_IMAGE:-agents-go-services:latest}
      - AGENTS_BUILD_TIME=${AGENTS_BUILD_TIME:-}
      - NATS_URL=${NATS_URL:-nats://nats:4222}
      - NODE_ID=${NODE_ID:-}
      - AGENTS_ROOT=${AGENTS_ROOT:-/home/patrik/agents}
      - AGENTS_REPO=${AGENTS_REPO:-/home/patrik/Projects/agents}
      - GH_TOKEN=${GH_TOKEN:-}
      - GITHUB_APP_PRIVATE_KEY_PATH=/app/.github-app-key.pem
    volumes:
      - ${AGENTS_MANAGER_DATA_DIR:-./data/manager}:/app/data:rw
      - /home/patrik/.github-app-key.pem:/app/.github-app-key.pem:ro
      - ${AGENTS_ROOT:-/home/patrik/agents}:${AGENTS_ROOT:-/home/patrik/agents}:rw
    depends_on:
      daemon:
        condition: service_started
      gateway:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

volumes:
  nats-data:
    driver: local
  gateway-traces:
    driver: local

networks:
  inference:
    name: agents-inference
    external: true

