name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check out agents-core contracts sibling
        shell: bash
        run: |
          set -e
          git clone --depth 1 --branch main https://github.com/marius-patrik/agents-core.git ../agents-core

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f bun.lock ] || [ -f bun.lockb ]; then
            bun install --frozen-lockfile
          elif [ -f package.json ]; then
            npm install
          else
            echo "No package manifest found; skipping dependency install."
          fi

      - name: Validate
        shell: bash
        run: bun run validate
