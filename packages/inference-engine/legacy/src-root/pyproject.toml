[project]
name = "agentos-runtime-legacy"
version = "3.0.44"
description = "Agentos runtime legacy package material."
requires-python = ">=3.11"
dependencies = [
  "cryptography>=42.0",
  "PyYAML>=6.0",
  "jsonschema>=4.0",
  "typer>=0.9",
  "rich>=13.0",
  "pytest>=8.0",
  "pytest-asyncio>=0.23",
  "pyarrow>=16.0",
  "duckdb>=1.0",
  "google-cloud-aiplatform>=1.38",
  "litellm[proxy]>=1.0",
  "numpy>=1.20.0",
  "matplotlib>=3.5.0",
  "pandas>=1.3.0",
  "requests>=2.25.0",
]

[tool.uv]
workspace = { members = ["gateway", ".user/projects/qft"] }

[tool.setuptools]
packages = []

[tool.pytest.ini_options]
pythonpath = ["gateway", ".user/projects/qft"]
testpaths = ["gateway/tests", ".user/projects/qft/tests"]
asyncio_mode = "auto"

[build-system]
requires = ["setuptools>=61.0.0", "wheel"]
build-backend = "setuptools.build_meta"

