// Switcher control plane (design §06 SW3): get the resolved switcher state, set
// a switcher on one of the four/five axes at a chosen scope, and list the
// available options per axis (with liveness). A session-scope set mid-turn is
// also expressible as a WS `switch` frame (see session_frames.proto); this
// service is the Connect/control-plane form.
syntax = "proto3";

package andromeda.v1;

import "andromeda/v1/common.proto";

// SwitcherService — the host + fabric/provider/model(+agent) control plane.
service SwitcherService {
  // The fully-resolved selection + which scope layer supplied it (§06 SW2).
  rpc GetSwitcherState(GetSwitcherStateRequest) returns (GetSwitcherStateResponse);
  // Apply a switcher change on one axis at a scope. Invalid combos are rejected
  // with a typed Error (§06 SW3, e.g. cloud-model while allow_cloud=false).
  rpc SetSwitcher(SetSwitcherRequest) returns (SetSwitcherResponse);
  // List the available options for an axis, reflecting live availability
  // (engine health, node reachability, cloud-provider OK count — §06 SW3).
  rpc ListSwitcherOptions(ListSwitcherOptionsRequest) returns (ListSwitcherOptionsResponse);
}

message GetSwitcherStateRequest {
  // Resolve in the context of this session (session > project > global). Empty
  // resolves the global/project default only.
  string session_id = 1;
}

message GetSwitcherStateResponse {
  SwitcherState state = 1;
}

message SetSwitcherRequest {
  SwitcherAxis axis = 1;
  // The target value (a host id, fabric name, provider id, model id or agent
  // id depending on axis).
  string value = 2;
  SwitcherScope scope = 3;
  // Required when scope = SESSION (the session to mutate).
  string session_id = 4;
}

message SetSwitcherResponse {
  // The new resolved state after the change.
  SwitcherState state = 1;
}

// A single selectable option for an axis, with liveness for the picker UX
// (§06 SW3 / D4 §10).
message SwitcherOption {
  string value = 1;
  string label = 2;
  // Whether the option is currently usable (online host / healthy engine /
  // enabled+verified cloud provider).
  bool available = 3;
  // Optional reason when unavailable (e.g. host_offline, cloud_disabled).
  string unavailable_reason = 4;
}

message ListSwitcherOptionsRequest {
  SwitcherAxis axis = 1;
  // Context for fabric-dependent axes (provider/model options depend on the
  // currently-selected fabric) and for session-scoped resolution.
  string session_id = 2;
}

message ListSwitcherOptionsResponse {
  repeated SwitcherOption options = 1;
}
