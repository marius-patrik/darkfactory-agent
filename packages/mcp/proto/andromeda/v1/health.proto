// Health control plane (design §01 G2, §11). A cluster/fabric snapshot the TUI
// `/health` and web ops console render. The `paused` field reflects the
// require-all-nodes pause state (§00 S4 / D-020) — CLI status/health exit 0 with
// a paused field per D-029.
syntax = "proto3";

package andromeda.v1;

import "andromeda/v1/common.proto";

// HealthService — cluster/fabric/datastore liveness snapshot.
service HealthService {
  rpc GetHealth(GetHealthRequest) returns (GetHealthResponse);
}

message GetHealthRequest {}

// The health of one named subsystem (gateway / postgres / nats / engine / ...).
message ComponentHealth {
  string name = 1;
  // ok | degraded | down.
  string state = 2;
  string detail = 3;
}

message GetHealthResponse {
  // True when the system is paused under require-all-nodes (a server is down,
  // §00 S4 / D-020). Clients render a paused banner; turn dispatch is gated.
  bool paused = 1;
  repeated Node nodes = 2;
  repeated ComponentHealth components = 3;
  // Aggregate usage/budget rollup (degrade-to-local indicator, §01 G6).
  Usage usage = 4;
}
