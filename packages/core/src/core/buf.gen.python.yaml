# Python codegen for the inference-engine consumer.
#
# Run this only from the agents-mono/os/agents-core worktree when you are also
# intentionally updating the sibling inference-engine repo:
#
#   buf generate proto --template buf.gen.python.yaml
#
# The default buf.gen.yaml is intentionally limited to in-repo Go and TS
# outputs so a normal agents-core codegen freshness check cannot mutate another
# repository.
version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/marius-patrik/agentos/agentos-core/contracts-go/gen

plugins:
  - remote: buf.build/protocolbuffers/python:v35.0
    out: ../inference-engine/python-agent/agent/gen
  - remote: buf.build/protocolbuffers/pyi:v35.0
    out: ../inference-engine/python-agent/agent/gen
