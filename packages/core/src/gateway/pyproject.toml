[project]
name = "agent-os-gateway"
version = "0.1.0"
description = "Agent OS local model gateway with OpenAI-format routing, health probes, and a source-owned registry."
requires-python = ">=3.12"
dependencies = [
  "fastapi==0.136.3",
  "uvicorn[standard]==0.49.0",
  "httpx==0.28.1",
  "pydantic==2.13.4",
  "PyYAML==6.0.3",
  "jsonschema==4.26.0",
  "typer==0.26.7",
  "rich==15.0.0",
  "connectrpc==0.11.0",
  "protobuf-py==0.1.1",
]

[project.scripts]
agent-os-gateway = "llm_gateway.cli:app"

[dependency-groups]
dev = [
  "httpx2==2.5.0",
  "mypy==2.1.0",
  "pytest==9.0.3",
  "pytest-asyncio==1.4.0",
  "ruff==0.15.20",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["llm_gateway", "agent_os"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = ["."]

[tool.ruff]
line-length = 140
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
check_untyped_defs = true
ignore_missing_imports = true
explicit_package_bases = true
