schema_version: gateway-registry-v1
# VS1-MINIMAL seed: the five local engines (OpenAI-compatible api_bases on the
# loopback). provider=local routes via the generic-HTTP backend. Cloud stubs are
# present but disabled; cloud dispatch remains credential-gated and deferred.
models:
  qwen3-8b:
    id: qwen3-8b
    name: Qwen3 8B (general)
    provider: local
    model: qwen3-8b
    api_base: http://127.0.0.1:8001/v1
    role: general
    context_length: 32768
    quant: deployment-selected
    gpu: local
    tensor_parallel: 1
    fallback_model: null
    enabled: true
    cloud: false

  coder-32b-awq:
    id: coder-32b-awq
    name: Coder 32B AWQ (coding)
    provider: local
    model: coder-32b-awq
    api_base: http://127.0.0.1:8002/v1
    role: coding
    context_length: 32768
    quant: AWQ
    gpu: local
    tensor_parallel: 1
    fallback_model: null
    enabled: true
    cloud: false

  qwen2.5-7b-q4:
    id: qwen2.5-7b-q4
    name: Qwen2.5 7B Q4 (general/fast)
    provider: local
    model: qwen2.5-7b-q4
    api_base: http://127.0.0.1:8003/v1
    role: general
    context_length: 32768
    quant: Q4
    gpu: local
    tensor_parallel: 1
    fallback_model: null
    enabled: true
    cloud: false

  conv-7b-1m:
    id: conv-7b-1m
    name: Conversation 7B 1M-ctx
    provider: local
    model: conv-7b-1m
    api_base: http://127.0.0.1:8004/v1
    role: conversation
    context_length: 1048576
    quant: deployment-selected
    gpu: local
    tensor_parallel: 1
    fallback_model: null
    enabled: true
    cloud: false

  conv-14b-1m:
    id: conv-14b-1m
    name: Conversation 14B 1M-ctx
    provider: local
    model: conv-14b-1m
    api_base: http://127.0.0.1:8005/v1
    role: conversation
    context_length: 1048576
    quant: deployment-selected
    gpu: local
    tensor_parallel: 1
    fallback_model: null
    enabled: true
    cloud: false

  claude-subscription:
    id: claude-subscription
    # CUSTOM ADAPTER PENDING (#1288 follow-up): Anthropic Messages API + OAuth
    # Bearer (not x-api-key) is not litellm-native. Router fails CLOSED until the
    # adapter lands. Also a ToS consideration (subscription token vs raw API).
    name: Claude subscription OAuth (custom adapter pending)
    provider: litellm-remote
    model: anthropic/claude-sonnet-4-5
    api_base: https://api.anthropic.com
    role: general
    context_length: 200000
    fallback_model: qwen3-8b
    enabled: false
    cloud: true
    extra:
      oauth_provider: claude
      auth_mode: oauth
      litellm_native: false
      verified_2026_06_14:
        token: https://console.anthropic.com/v1/oauth/token
        client_id: 9d1c250a-e61b-44d9-88ed-5944d1962f5e
        inference: https://api.anthropic.com/v1/messages
        beta_header: oauth-2025-04-20

  codex-subscription:
    id: codex-subscription
    # CUSTOM ADAPTER PENDING (#1288 follow-up): ChatGPT-backend Responses API is
    # not litellm-native. Router fails CLOSED until the adapter lands.
    name: Codex subscription OAuth (custom adapter pending)
    provider: litellm-remote
    model: openai/gpt-5-codex
    api_base: https://chatgpt.com/backend-api/codex
    role: coding
    context_length: 200000
    fallback_model: coder-32b-awq
    enabled: false
    cloud: true
    extra:
      oauth_provider: codex
      auth_mode: oauth
      litellm_native: false
      verified_2026_06_14:
        token: https://auth.openai.com/oauth/token
        client_id: app_EMoamEEZ73f0CkXaXp7hrann
        inference: https://chatgpt.com/backend-api/codex

  kimi-subscription:
    id: kimi-subscription
    # litellm-native: OpenAI-compatible endpoint + OAuth access token as Bearer.
    # The ONE cloud provider that needs no custom adapter (#1288). Still disabled
    # until a live subscription tool-calling proof flips enabled -> true.
    name: Kimi subscription OAuth (litellm-native)
    provider: litellm-remote
    model: openai/kimi-for-coding
    api_base: https://api.kimi.com/coding/v1
    role: general
    context_length: 200000
    fallback_model: qwen3-8b
    enabled: false
    cloud: true
    extra:
      oauth_provider: kimi
      auth_mode: oauth
      litellm_native: true
      verified_2026_06_14:
        token_discovery: https://auth.kimi.com/.well-known/oauth-authorization-server
        inference: https://api.kimi.com/coding/v1

  agy-subscription:
    id: agy-subscription
    # CUSTOM ADAPTER PENDING (#1288 follow-up): cloudcode-pa Code Assist endpoint
    # is not litellm-native. Router fails CLOSED until the adapter lands.
    name: Gemini/AGY subscription OAuth (custom adapter pending)
    provider: litellm-remote
    model: gemini/gemini-2.5-pro
    api_base: https://cloudcode-pa.googleapis.com
    role: general
    context_length: 1000000
    fallback_model: conv-7b-1m
    enabled: false
    cloud: true
    extra:
      oauth_provider: agy
      auth_mode: oauth
      litellm_native: false
      verified_2026_06_14:
        token: https://oauth2.googleapis.com/token
        client_id_env: LLM_GATEWAY_AGY_CLIENT_ID
        client_secret_env: LLM_GATEWAY_AGY_CLIENT_SECRET
        inference: https://cloudcode-pa.googleapis.com
      auth_mode: oauth
      headers_pending_verification:
        authorization: "Bearer <oauth access token>"
