# QFT containerized autoresearch loop (I12)
#
# Two BOUNDED k8s Jobs that run the QFT autoresearch loop — seed + bridge +
# iterate — inside the agents harness image. These replace the RETIRED
# user-systemd units `agents-qft-seeder.service` / `agents-qft-bridge.service`
# (see deploy/dekstop/systemd/*; those `Restart=always` units are no longer the
# source of truth and must not be enabled alongside this manifest).
#
# Anti-runaway contract (deploy/README.md, ADR-035/045/046):
#   - The Go daemon is the SOLE scheduler. It applies/reconciles these Jobs.
#     There is NO CronJob, NO fan-out, NO self-trigger here.
#   - Each Job is BOUNDED: backoffLimit 0 (no k8s-driven retries) and a fixed
#     activeDeadlineSeconds cap so a stuck loop terminates instead of running
#     away. The daemon re-applies after the cap to continue the loop.
#   - The seeder is internally a singleton (flock guard in seeder_loop.py) and
#     all its state writes are atomic (tempfile + rename), so a restart is
#     crash-safe and a re-apply is idempotent: while the Job exists, an
#     identical `kubectl apply` is a no-op; if the seeder pod is already holding
#     the flock, a second process exits immediately.
#
# Runtime layout: the harness image mounts $AGENTS_ROOT (hostPath) and ships
# python3 + uv. The QFT tenant lives at $AGENTS_ROOT/.user/projects/qft (the
# same path the retired systemd units used). State (queue.jsonl, heartbeats,
# baseline, evidence) is durable on the mounted root, so it survives pod churn.
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qft-seeder-loop
  namespace: agents
  labels:
    app.kubernetes.io/name: qft-autoresearch
    app.kubernetes.io/component: seeder
    agents.platform/tenant: qft
    agents.platform/scheduler: daemon
spec:
  # Bounded: no k8s retries, single completion, hard wall-clock cap. The daemon
  # owns continuation by re-applying, so the loop never self-perpetuates here.
  backoffLimit: 0
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 3600
  # Reaped automatically after it finishes so a re-apply is clean.
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qft-autoresearch
        app.kubernetes.io/component: seeder
        agents.platform/tenant: qft
    spec:
      restartPolicy: Never
      containers:
        - name: seeder
          image: agents/harness:latest
          imagePullPolicy: IfNotPresent
          # The seeder_loop driver is itself the bounded loop: it runs
          # `seeder.py --cap 4 --budget 300` iterations under a flock singleton
          # and writes atomic heartbeats. activeDeadlineSeconds caps the Job.
          command:
            - /bin/sh
            - -lc
            - >-
              set -eu;
              QFT_ROOT="${AGENTS_ROOT}/.user/projects/qft";
              cd "$QFT_ROOT";
              exec uv run python "$QFT_ROOT/seeder_loop.py"
          env:
            - name: AGENTS_ROOT
              value: /home/patrik/.agents
            - name: QFT_ROOT
              value: /home/patrik/.agents/.user/projects/qft
            - name: QFT_SEEDER_LOG
              value: /home/patrik/.agents/.user/projects/qft/tasks/seeder_loop.log
            - name: QFT_QUEUE_PATH
              value: /home/patrik/.agents/.user/projects/qft/tasks/queue.jsonl
            - name: QFT_SEEDER_HEARTBEAT
              value: /home/patrik/.agents/.user/projects/qft/tasks/seeder_heartbeat.json
          resources:
            requests:
              cpu: "500m"
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: agents-root
              mountPath: /home/patrik/.agents
      volumes:
        - name: agents-root
          hostPath:
            path: /home/patrik/.agents
            type: Directory
---
apiVersion: batch/v1
kind: Job
metadata:
  name: qft-queue-bridge
  namespace: agents
  labels:
    app.kubernetes.io/name: qft-autoresearch
    app.kubernetes.io/component: bridge
    agents.platform/tenant: qft
    agents.platform/scheduler: daemon
spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  activeDeadlineSeconds: 3600
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qft-autoresearch
        app.kubernetes.io/component: bridge
        agents.platform/tenant: qft
    spec:
      restartPolicy: Never
      containers:
        - name: bridge
          image: agents/harness:latest
          imagePullPolicy: IfNotPresent
          # The bridge polls queue.jsonl and turns pending tasks into GitHub
          # PRD issues (deduped by Task ID). It writes an atomic heartbeat and
          # is safe to restart; activeDeadlineSeconds bounds each lease.
          command:
            - /bin/sh
            - -lc
            - >-
              set -eu;
              QFT_ROOT="${AGENTS_ROOT}/.user/projects/qft";
              cd "$QFT_ROOT";
              exec uv run python "$QFT_ROOT/bridge.py"
          env:
            - name: AGENTS_ROOT
              value: /home/patrik/.agents
            - name: QFT_ROOT
              value: /home/patrik/.agents/.user/projects/qft
            - name: QFT_QUEUE_PATH
              value: /home/patrik/.agents/.user/projects/qft/tasks/queue.jsonl
            - name: QFT_BRIDGE_LOG
              value: /home/patrik/.agents/.user/projects/qft/tasks/bridge.log
            - name: QFT_BRIDGE_HEARTBEAT
              value: /home/patrik/.agents/.user/projects/qft/tasks/bridge_heartbeat.json
            - name: GITHUB_REPO
              value: marius-patrik/agents
            # GitHub App auth: key is provided to the host out-of-band (NOT in
            # this repo / NOT a Secret committed here). The bridge reads it from
            # the mounted path. See .user/projects/qft/docs/github-app-setup.md.
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /home/patrik/.github-app-key.pem
          resources:
            requests:
              cpu: "250m"
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: agents-root
              mountPath: /home/patrik/.agents
            - name: github-app-key
              mountPath: /home/patrik/.github-app-key.pem
              readOnly: true
      volumes:
        - name: agents-root
          hostPath:
            path: /home/patrik/.agents
            type: Directory
        # Host-provided GitHub App private key. Out-of-band on the node; never
        # committed to this repo. Bridge fails closed if it is absent.
        - name: github-app-key
          hostPath:
            path: /home/patrik/.github-app-key.pem
            type: File

