# Rommie single-node Postgres (VS2 / S3.0b) — declarative form of bring-up.sh.
# localhost-bound; mTLS + the clustered kine->PG pair land in VS3.
#
#   cp .env.example .env   # then set POSTGRES_PASSWORD (from ~/.rommie/secrets/pg_password) + ROMMIE_PG_DATA
#   docker compose up -d
#   docker compose --profile migrate run --rm migrate   # apply services/db migrations
name: rommie
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: rommie-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: rommie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/postgres/.env}
    volumes:
      - ${ROMMIE_PG_DATA:?set ROMMIE_PG_DATA in deploy/postgres/.env}:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # localhost only; ssh-tunnel for remote until VS3 mTLS
    networks: [rommie]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rommie"]
      interval: 5s
      timeout: 3s
      retries: 12

  # one-shot migrator (profile-gated so `up` doesn't start it): applies services/db migrations
  migrate:
    image: migrate/migrate:latest
    profiles: [migrate]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../services/db/migrations:/migrations:ro
    command:
      - -path=/migrations
      - -database=postgres://postgres:${POSTGRES_PASSWORD}@rommie-pg:5432/rommie?sslmode=disable
      - up
    networks: [rommie]

networks:
  rommie:
    name: rommie
