name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Sync dependencies
        run: python -m uv sync --locked

      - name: Lint
        run: python -m uv run ruff check llm_gateway tests

      - name: Typecheck
        run: python -m uv run mypy llm_gateway

      - name: Test
        run: python -m uv run pytest -q
