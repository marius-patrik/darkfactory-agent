services:
  llm-gateway:
    build:
      context: .
    image: llm-gateway:local
    ports:
      - "4000:4000"
    environment:
      GATEWAY_TRACE_DIR: /var/lib/llm-gateway/traces
    volumes:
      - gateway-traces:/var/lib/llm-gateway/traces
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:4000/healthz', timeout=5).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gateway-traces:
